<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proyecto DevOps</title>

<style>

body{
    margin:0;
    padding:0;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    font-family:Arial,sans-serif;
    color:white;
    text-align:center;
}

.container{
    margin-top:100px;
}

h1{
    font-size:60px;
    color:#38bdf8;
    margin-bottom:10px;
}

h2{
    color:#cbd5e1;
    margin-bottom:40px;
}

.box{
    background:#111827;
    width:70%;
    margin:auto;
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

ul{
    list-style:none;
    padding:0;
}

li{
    font-size:24px;
    padding:12px;
    border-bottom:1px solid #334155;
}

.footer{
    margin-top:40px;
    color:#94a3b8;
    font-size:18px;
}

</style>
</head>

<body>

<div class="container">

    <div class="box">

        <h1>Proyecto DevOps</h1>

        <h2>Infraestructura y monitoreo en AWS</h2>

        <ul>
            <li> AWS EC2</li>
            <li> Docker Containers</li>
            <li> Nginx Web Server</li>
            <li> Prometheus Monitor</li>
            <li> Grafana Dashboard </li>
        </ul>

        <div class="footer">
            Servidor desplegado exitosamente en la nube
        </div>

    </div>

</div>

</body>
</html>
