
services:

  web:
    image: nginx:latest
    container_name: proyecto-devops

    ports:
      - "80:80"

    volumes:
      - ./:/usr/share/nginx/html

  prometheus:
    image: prom/prometheus

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana

    container_name: grafana

    ports:
      - "3000:3000"
